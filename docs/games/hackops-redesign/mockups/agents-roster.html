<title>HackOps — Agents</title>
<link rel="stylesheet" href="shared.css">
<style>
  .roster-grid { grid-template-columns: repeat(auto-fill, minmax(360px,1fr)); }
  .agent-card { position:relative; }
  .portrait-lg { width:96px; height:96px; flex-shrink:0; }
  .gear-row { padding:12px 14px; margin-bottom:8px; }
  .gear-row.empty { border-style:dashed; color: var(--text-dim); }
  .open-slot { display:flex; flex-direction:column; align-items:center; justify-content:center; gap:14px; min-height:320px; border-style:dashed; border-color: var(--border-strong); }
  .sleeper-row { display:flex; align-items:center; gap:16px; padding:14px 16px; }
</style>
<div id="app-shell"></div>

<div class="page">
  <div class="eyebrow">// roster management</div>
  <div class="row between wrap" style="margin: 6px 0 20px;">
    <h1 style="margin:0; font-size:22px;">Agents</h1>
    <a href="black-market.html" class="btn">Need more agents? → Black Market</a>
  </div>

  <div class="section-title">Active roster <span class="text-dim" style="text-transform:none; font-weight:400; letter-spacing:0;">— 4 / 5 slots</span></div>
  <div class="grid roster-grid" style="margin-bottom:32px;" id="active-roster"></div>

  <div class="section-title">Sleeper agents <span class="text-dim" style="text-transform:none; font-weight:400; letter-spacing:0;">— 3 in storage, 15 max total</span></div>
  <div class="frame">
    <div class="sleeper-row" style="border-bottom:1px solid var(--border);">
      <div class="mini-portrait" style="width:48px;height:48px;"><img class="photo-fill" src="../assets/agent/infiltrator.jpg" alt="Infiltrator"></div>
      <div style="flex:1;">
        <div class="row gap-10"><b style="font-size:15px;">Hex</b><span class="badge badge-rarity operative">Operative</span></div>
        <div class="text-dim mono" style="font-size:12px; margin-top:2px;">Infiltrator &middot; Lv 6 &middot; PWR 88</div>
      </div>
      <div class="row gap-6">
        <button class="btn btn-sm btn-primary" onclick="alert('Activated (mock)')">Activate</button>
        <a href="loadout.html?agent=hex" class="btn btn-sm">Equip</a>
        <button class="btn btn-sm" onclick="alert('Rename (mock)')">Rename</button>
        <button class="btn btn-sm btn-danger" onclick="armConfirm(this, () => alert('Fired (mock)'))">Fire</button>
      </div>
    </div>
    <div class="sleeper-row" style="border-bottom:1px solid var(--border);">
      <div class="mini-portrait" style="width:48px;height:48px;"><img class="photo-fill" src="../assets/agent/cryptographer.jpg" alt="Cryptographer"></div>
      <div style="flex:1;">
        <div class="row gap-10"><b style="font-size:15px;">Vector</b><span class="badge badge-rarity ghost">Ghost</span></div>
        <div class="text-dim mono" style="font-size:12px; margin-top:2px;">Cryptographer &middot; Lv 2 &middot; PWR 24</div>
      </div>
      <div class="row gap-6">
        <button class="btn btn-sm btn-primary" onclick="alert('Activated (mock)')">Activate</button>
        <a href="loadout.html?agent=vector" class="btn btn-sm">Equip</a>
        <button class="btn btn-sm" onclick="alert('Rename (mock)')">Rename</button>
        <button class="btn btn-sm btn-danger" onclick="armConfirm(this, () => alert('Fired (mock)'))">Fire</button>
      </div>
    </div>
    <div class="sleeper-row">
      <div class="mini-portrait" style="width:48px;height:48px;"><img class="photo-fill" src="../assets/agent/bruteforce.jpg" alt="Bruteforce"></div>
      <div style="flex:1;">
        <div class="row gap-10"><b style="font-size:15px;">Proxy</b><span class="badge badge-rarity specialist">Specialist</span></div>
        <div class="text-dim mono" style="font-size:12px; margin-top:2px;">Bruteforce &middot; Lv 11 &middot; PWR 176</div>
      </div>
      <div class="row gap-6">
        <button class="btn btn-sm btn-primary" onclick="alert('Activated (mock)')">Activate</button>
        <a href="loadout.html?agent=proxy" class="btn btn-sm">Equip</a>
        <button class="btn btn-sm" onclick="alert('Rename (mock)')">Rename</button>
        <button class="btn btn-sm btn-danger" onclick="armConfirm(this, () => alert('Fired (mock)'))">Fire</button>
      </div>
    </div>
  </div>
</div>

<script src="shared.js"></script>
<script>
  renderShell('agents')

  const activeAgents = [
    { id:'cipher', name:'Cipher', rarity:'specialist', class:'infiltrator', level:14, xpPct:62, power:214,
      gear: [
        { id:'g1', name:'Advanced USB Infiltrator', slot:'tool', rarity:'specialist', level:6, mods:[{type:'power_flat',value:12},{type:'loot_percent',value:5.1}] },
        { id:'g2', name:'Ghost Suite', slot:'software', rarity:'ghost', level:3, mods:[{type:'power_flat',value:6}] },
      ] },
    { id:'wraith2', name:'Wraith-2', rarity:'operative', class:'cryptographer', level:9, xpPct:31, power:132,
      gear: [
        { id:'g3', name:'Signal Probe', slot:'tool', rarity:'operative', level:2, mods:[{type:'speed_percent',value:6.4}] },
        { id:'g4', name:'Signal Scrambler', slot:'hardware', rarity:'operative', level:4, mods:[{type:'power_flat',value:9},{type:'gem_chance',value:0.8}] },
      ] },
    { id:'null', name:'Null', rarity:'elite', class:'bruteforce', level:17, xpPct:88, power:388,
      gear: [
        { id:'g5', name:'Military-Grade Black Tap', slot:'tool', rarity:'elite', level:9, mods:[{type:'power_flat',value:20},{type:'item_chance',value:4.2}] },
        { id:'g6', name:'Military-Grade Recursive Worm', slot:'software', rarity:'elite', level:7, mods:[{type:'loot_percent',value:8.8},{type:'xp_flat',value:5}] },
        { id:'g7', name:'Military-Grade Dark Server', slot:'hardware', rarity:'elite', level:8, mods:[{type:'power_flat',value:22},{type:'speed_percent',value:6.1}] },
      ] },
    { id:'static', name:'Static', rarity:'ghost', class:'social_engineer', level:4, xpPct:15, power:61, gear:[] },
  ]

  function agentCardHTML(a) {
    const gearRows = a.gear.map(item => `
      <div class="frame frame-2 rarity-edge ${item.rarity} gear-row">
        <div class="row between">
          <span style="font-size:14.5px; font-weight:700;" class="text-rarity ${item.rarity}">${item.name}</span>
          <span class="badge">${item.slot}</span>
        </div>
        <div class="row gap-8 wrap" style="margin-top:8px;">${item.mods.map(modChipHTML).join('')}</div>
      </div>
    `).join('')
    const emptySlots = 3 - a.gear.length
    const emptyRows = Array.from({length: emptySlots}).map(() => `
      <div class="frame frame-2 gear-row empty" style="border-style:dashed; text-align:center; font-family:var(--font-mono); font-size:12px;">+ empty slot</div>
    `).join('')

    return `
      <div class="frame p-20 agent-card">
        <div class="row gap-16" style="align-items:flex-start;">
          <div class="portrait-lg"><img class="photo-fill" src="${CLASS_PORTRAIT[a.class]}" alt="${CLASS_LABEL[a.class]}"></div>
          <div style="flex:1;">
            <div class="row between wrap gap-8"><span class="card-title-lg" style="font-size:19px;">${a.name}</span><span class="badge badge-rarity ${a.rarity}">${a.rarity[0].toUpperCase()+a.rarity.slice(1)}</span></div>
            <div class="card-sub-md" style="margin-top:5px; font-size:13.5px;">${CLASS_LABEL[a.class]} &middot; Level ${a.level}</div>
            <div class="bar xp" style="margin-top:10px;"><i style="width:${a.xpPct}%"></i></div>
          </div>
        </div>

        <div class="stat-label-md" style="margin:18px 0 8px;">Equipped gear</div>
        <div class="col gap-8">${gearRows}${emptyRows}</div>

        <div class="row between" style="margin-top:16px;">
          <span class="mono text-accent" style="font-size:16px; font-weight:700;">PWR ${a.power}</span>
          <div class="row gap-6">
            <a href="loadout.html?agent=${a.id}" class="btn btn-sm">Equip</a>
            <button class="btn btn-sm" onclick="armConfirm(this, () => alert('Deactivated (mock)'))">Deactivate</button>
          </div>
        </div>
      </div>
    `
  }

  document.getElementById('active-roster').innerHTML =
    activeAgents.map(agentCardHTML).join('') +
    `<div class="frame open-slot p-18">
      <div class="text-dim mono" style="font-size:12px; letter-spacing:.08em;">OPEN SLOT</div>
      <button class="btn btn-primary" onclick="alert('Roster expand → POST /api/hack/roster/expand (existing endpoint)')">Buy Slot — $10,000,000</button>
    </div>`
</script>
