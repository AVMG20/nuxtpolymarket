name: ci

on: push

jobs:
  ci:
    runs-on: ubuntu-latest

    # The balance concurrency tests exercise real Postgres row locking, so they
    # need a real database — without one they silently skip and prove nothing.
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_USER: polynux
          POSTGRES_PASSWORD: polynux
          POSTGRES_DB: polynux
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://polynux:polynux@localhost:5432/polynux

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.10

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Push database schema
        run: bunx drizzle-kit push --force

      - name: Typecheck
        run: bun run typecheck

      - name: Test
        run: bun run test
