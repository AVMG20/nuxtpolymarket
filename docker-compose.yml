services:
  postgres:
    image: postgres:17-alpine
    container_name: polynux-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: polynux
      POSTGRES_PASSWORD: polynux
      POSTGRES_DB: polynux
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
