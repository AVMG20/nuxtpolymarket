<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 1000" preserveAspectRatio="xMidYMid slice">
  <defs>
    <radialGradient id="sky" cx="50%" cy="30%" r="75%">
      <stop offset="0%" stop-color="#0f3550"/>
      <stop offset="45%" stop-color="#0a2038"/>
      <stop offset="100%" stop-color="#040914"/>
    </radialGradient>
    <radialGradient id="gate-glow" cx="50%" cy="46%" r="50%">
      <stop offset="0%" stop-color="#fbbf24" stop-opacity="0.9"/>
      <stop offset="35%" stop-color="#f59e0b" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#f59e0b" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="column" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#12283d"/>
      <stop offset="45%" stop-color="#1c3c58"/>
      <stop offset="100%" stop-color="#0a1a29"/>
    </linearGradient>
    <linearGradient id="floor" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0d2438" stop-opacity="0"/>
      <stop offset="100%" stop-color="#020508" stop-opacity="0.9"/>
    </linearGradient>
    <filter id="soft" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="14"/>
    </filter>
    <filter id="soft-sm" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="4"/>
    </filter>
  </defs>

  <rect width="1600" height="1000" fill="url(#sky)"/>

  <!-- distant aether haze bands -->
  <ellipse cx="800" cy="120" rx="900" ry="140" fill="#2dd4bf" opacity="0.06" filter="url(#soft)"/>
  <ellipse cx="500" cy="260" rx="500" ry="90" fill="#38bdf8" opacity="0.08" filter="url(#soft)"/>
  <ellipse cx="1150" cy="300" rx="480" ry="90" fill="#f59e0b" opacity="0.05" filter="url(#soft)"/>

  <!-- glowing gate arch, centered behind the reel area -->
  <circle cx="800" cy="460" r="330" fill="url(#gate-glow)"/>
  <g opacity="0.55" filter="url(#soft-sm)">
    <path d="M560 760 V430 C560 280 670 190 800 190 C930 190 1040 280 1040 430 V760" fill="none" stroke="#fde68a" stroke-width="14"/>
    <path d="M610 760 V440 C610 315 695 235 800 235 C905 235 990 315 990 440 V760" fill="none" stroke="#fbbf24" stroke-width="6" opacity="0.7"/>
  </g>

  <!-- side columns -->
  <g opacity="0.9">
    <rect x="40" y="120" width="70" height="820" fill="url(#column)"/>
    <rect x="30" y="100" width="90" height="30" fill="#1c3c58"/>
    <rect x="1490" y="120" width="70" height="820" fill="url(#column)"/>
    <rect x="1480" y="100" width="90" height="30" fill="#1c3c58"/>
  </g>
  <g opacity="0.55">
    <rect x="150" y="220" width="46" height="720" fill="url(#column)"/>
    <rect x="1404" y="220" width="46" height="720" fill="url(#column)"/>
  </g>

  <!-- floating aether motes -->
  <g fill="#67e8f9">
    <circle cx="260" cy="360" r="4" opacity="0.7"/>
    <circle cx="340" cy="520" r="3" opacity="0.5"/>
    <circle cx="1280" cy="300" r="4" opacity="0.6"/>
    <circle cx="1360" cy="470" r="3" opacity="0.5"/>
    <circle cx="220" cy="640" r="3" opacity="0.4"/>
    <circle cx="1400" cy="640" r="3" opacity="0.4"/>
  </g>
  <g fill="#fbbf24">
    <circle cx="420" cy="230" r="3" opacity="0.6"/>
    <circle cx="1180" cy="210" r="3" opacity="0.55"/>
    <circle cx="300" cy="180" r="2.5" opacity="0.5"/>
    <circle cx="1320" cy="180" r="2.5" opacity="0.5"/>
  </g>

  <!-- ground fade -->
  <rect x="0" y="700" width="1600" height="300" fill="url(#floor)"/>
</svg>
